AWSTemplateFormatVersion: "2010-09-09"
Description: EC2 with Apache and SSM

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro

  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-02e1d700b443d2e95

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-0852535cb8cb1ac22

  ImageId:
    Type: AWS::EC2::Image::Id
    Default: ami-0a905b99668efea4b

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and SSH
      VpcId: !Ref VpcId

      SecurityGroupIngress:
        - IpProtocol: -1
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0

        - IpProtocol: -1
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0

      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  WebServer:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref ImageId
      InstanceType: !Ref InstanceType
      SubnetId: !Ref SubnetId

      SecurityGroupIds:
        - !Ref SecurityGroup

      IamInstanceProfile: !Ref InstanceProfile

      Tags:
        - Key: Name
          Value: Apache-WebServer

      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -xe

          dnf update -y
          dnf install -y httpd

          systemctl enable httpd
          systemctl start httpd

          echo "<h1>Apache Installed Successfully</h1>" > /var/www/html/index.html

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref WebServer

  PrivateIP:
    Description: Private IP Address
    Value: !GetAtt WebServer.PrivateIp

  PublicIP:
    Description: Public IP Address
    Value: !GetAtt WebServer.PublicIp
