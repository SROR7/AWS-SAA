AWSTemplateFormatVersion: 2010-09-09
Description: Create A Role For US to assume and create resource we 'll have access to
Parameters:
  BucketName:
    Type: String
    Default: "sts-fun-example-456"
Resources:
  S3Bucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Ref BucketName
  StsRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - s3.amazonaws.com
            Action:
              - "sts:AssumeRole"
      Path: /
      Policies:
        - PolicyName: s3access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: "*"
                Resource:
                  [
                    !Sub "arn:aws:s3:::${BucketName}",
                    !Sub "arn:aws:s3:::${BucketName}/*"
                  ]
